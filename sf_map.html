  .info-panel .stat { display:flex; justify-content:space-between; gap:8px; margin: 2px 0; }
  .info-panel .val { font-weight: bold; }
  .info-panel .badge {

// ── Info panel (hover) ────────────────────────────────────────────────────────
const info = L.control({ position: 'topright' });
info.onAdd = function() {
  this._div = L.DomUtil.create('div','info-panel');
  this._div.innerHTML = '<h4 style="color:#aaa;font-weight:normal">Hover a neighborhood<br>or school</h4>';
  return this._div;
};

info.showNeighborhood = function(name, d) {
  const crimeColors = {"High Crime":"#c0392b","Moderate — Higher Crime":"#e67e22",
                       "Green & Moderate Crime":"#27ae60","Safest (Less Green)":"#2980b9"};
  const col = crimeColors[d.cluster] || '#888';
  const maxTotal = 11312;
  const pct = Math.round((d.total / maxTotal) * 100);
  this._div.innerHTML = `
    <h4>${name}</h4>
    <div class="subtitle">${d.cluster}</div>
    <div class="section-label">Crime incidents (May 2025–present)</div>
    <div class="stat"><span>Total</span><span class="val">${d.total.toLocaleString()}</span></div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
    <div class="stat" style="margin-top:5px"><span>Violent</span><span class="val">${d.violent.toLocaleString()}</span></div>
    <div class="stat"><span>Property</span><span class="val">${d.property.toLocaleString()}</span></div>
    <div class="stat"><span>Drug / Disorder</span><span class="val">${d.drug.toLocaleString()}</span></div>
  `;
};

info.showSchool = function(s) {
  const zoneColors = {"High Access Zone":"#8e44ad","Mid Access Zone":"#f39c12",

       <div class="stat"><span>Total titles</span><span class="val">${s.total_titles}</span></div>`
    : `<div style="color:#aaa;font-size:11px;margin-top:2px">No recorded titles</div>`;
  this._div.innerHTML = `

    <span class="badge" style="background:${col}">${s.cluster}</span>
    <div class="section-label">Student athletes</div>
    <div class="stat"><span>Athletes</span><span class="val">${s.athletes}</span></div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${athPct}%"></div></div>
    <div class="stat" style="margin-top:4px"><span>Participation rate</span><span class="val">${s.participation}%</span></div>
    <div class="section-label">Competitive titles (since 2020)</div>
    ${titleRows}
    <div class="section-label">Park access (within 1 mile)</div>
    <div class="stat"><span>Facilities</span><span class="val">${s.facilities}</span></div>
    <div class="stat"><span>Green space</span><span class="val">${s.acres} acres</span></div>
  `;
};

info.clear = function() {
  this._div.innerHTML = '<h4 style="color:#aaa;font-weight:normal">Hover a neighborhood<br>or school</h4>';
};

info.addTo(map);

// ── Neighborhood polygons ─────────────────────────────────────────────────────
function nhStyle(feature) {
  const name = feature.properties.name;
  const d = NH_DATA[name];
  const fill = d ? (CRIME_COLORS[d.cluster] || '#bdc3c7') : '#ecf0f1';
  return { fillColor: fill, weight: 1.5, color: '#fff', fillOpacity: 0.65 };
}

L.geoJSON(GEO, {
  style: nhStyle,
  onEachFeature: function(feature, layer) {
    const name = feature.properties.name;
    layer.on({
      mouseover: function(e) {
        e.target.setStyle({ weight: 3, fillOpacity: 0.85 });
        info.showNeighborhood(name, NH_DATA[name]);
      },
      mouseout: function(e) {
        e.target.setStyle(nhStyle(feature));
        info.clear();
      }
    });
  }
}).addTo(map);

// ── School dots ───────────────────────────────────────────────────────────────
const minAthletes = Math.min(...SCHOOLS.map(s => s.athletes));
const maxAthletes = Math.max(...SCHOOLS.map(s => s.athletes));
const MIN_R = 6, MAX_R = 20;

function athleteRadius(n) {
  const t = (Math.sqrt(n) - Math.sqrt(minAthletes)) /
            (Math.sqrt(maxAthletes) - Math.sqrt(minAthletes));
  return MIN_R + t * (MAX_R - MIN_R);
}

SCHOOLS.forEach(s => {
  const color  = SCHOOL_COLORS[s.cluster] || '#333';
  const radius = athleteRadius(s.athletes);
  const marker = L.circleMarker([s.lat, s.lon], {
    radius, fillColor: color, color: '#fff',
    weight: 2, fillOpacity: 0.92
  }).addTo(map);

  marker.on('mouseover', function() { info.showSchool(s); });
  marker.on('mouseout',  function() { info.clear(); });
});

// ── Legend ────────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <h4>SF Crime & School Access Map</h4>

    <h5>Neighborhood Crime Level</h5>
    ${Object.entries(CRIME_COLORS).map(([k,v]) =>
      `<div><span class="swatch" style="background:${v}"></span>${k}</div>`
    ).join('')}

    <h5>School Facility Access Zone</h5>
    ${Object.entries(SCHOOL_COLORS).map(([k,v]) =>
      `<div><span class="dot" style="background:${v}"></span>${k}</div>`
    ).join('')}

    <h5>Dot Size = # Athletes</h5>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <svg width="52" height="48" style="overflow:visible">
        <circle cx="8"  cy="40" r="6"  fill="#aaa" stroke="#fff" stroke-width="1.5"/>
        <circle cx="26" cy="34" r="13" fill="#aaa" stroke="#fff" stroke-width="1.5"/>
        <circle cx="44" cy="26" r="20" fill="#aaa" stroke="#fff" stroke-width="1.5"/>
      </svg>
      <div style="font-size:11px;color:#555;line-height:1.8">
        Small ≈ 13<br>
        Large ≈ 505
      </div>
    </div>

    <div style="margin-top:10px;font-size:10px;color:#888">
      Click school dots for details.<br>Hover neighborhoods for crime stats.
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
